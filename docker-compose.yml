services:
  postgres:
    image: postgres:16-alpine
    container_name: ti_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ti_user
      POSTGRES_PASSWORD: ti_secret_2024
      POSTGRES_DB: ti_system
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ti_user -d ti_system"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ti_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ti_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ti_user:ti_secret_2024@ti_postgres:5432/ti_system
      JWT_SECRET: jwt_super_secret_ti_system_2024
      JWT_EXPIRES_IN: 7d
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ti_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ti_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ti_network

volumes:
  postgres_data:

networks:
  ti_network:
    driver: bridge

